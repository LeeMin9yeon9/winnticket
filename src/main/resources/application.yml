server:
  port: 8080
  servlet:
    session:
      cookie:
        name: JSESSIONID
        path: /
        same-site: none
        secure: true

spring:
  profiles:
    active: local

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB


mybatis:
  mapper-locations: classpath*:kr/co/winnticket/**/*.xml
  type-aliases-package: kr.co.winnticket
  configuration:
    map-underscore-to-camel-case: true
  type-handlers-package: kr.co.winnticket.common.typehandler

jwt:
  access-token-validity: 10800000  #15분
  refresh-token-validity: 1209600000 #7일

